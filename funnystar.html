<!DOCTYPE html>
    <html lang="ko">

    <head>
    <style>

    body {
        margin: 0;
    }

    header {
        background: white;
        padding: 20px 40px;
        border-bottom: 1px solid #ddd;
    }

    .navbar {
        display: flex;
        align-items: center;
    }

    .logo {
        width: 150px;
        margin-right: 50px;
    }

    .menu {
        display: flex;
        gap: 30px;
        list-style: none;
    }

    .menu a {
        text-decoration: none;
        color: black;
        font-weight: bold;
    }

    .menu a:hover {
        cursor: pointer;
        color: purple;
    }

    </style>
</head>

<body>
	안녕하세요!
	<a href="https://google.com">구글 가기</a>
</body>

   		<div class="navbar">

     			  <ul class="menu">

        		  </ul>

    		</div>

	</header>

</html>
